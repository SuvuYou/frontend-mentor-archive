<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />

    <title>Frontend Mentor | Blog preview card</title>
  </head>
  <body class="page">
    <div class="card">
      <div class="image">
        <img
          src="assets/images/illustration-article.svg"
          alt="Abstract illustration"
        />
      </div>
      <div class="card-content">
        <span class="tag text-medium-bold">Learning</span>
        <p class="text-medium-2">Published 21 Dec 2023</p>
        <h2 class="text-title">HTML & CSS foundations</h2>
        <p class="text-medium-1">
          These languages are the backbone of every website, defining structure,
          content, and presentation.
        </p>
      </div>
      <div class="author">
        <img
          class="author-avatar"
          src="assets/images/image-avatar.webp"
          alt="Author avatar"
        />
        <p class="author-name text-medium-bold">Greg Hooper</p>
      </div>
    </div>
  </body>
</html>
