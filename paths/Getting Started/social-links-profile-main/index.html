<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Social links profile</title>

    <link rel="stylesheet" href="styles.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <section class="page">
      <div class="card">
        <div class="image">
          <img src="assets/images/avatar-jessica.jpeg" alt="Profile avatar" />
        </div>
        <div class="content">
          <h2 class="title">Jessica Randall</h2>
          <h3 class="location">London, United Kingdom</h3>
          <p class="description">"Front-end developer and avid reader."</p>
        </div>
        <div class="links">
          <a class="link" href="https://www.google.com">GitHub</a>
          <a class="link" href="https://www.google.com">Frontend Mentor</a>
          <a class="link" href="https://www.google.com">LinkedIn</a>
          <a class="link" href="https://www.google.com">Twitter</a>
          <a class="link" href="https://www.google.com">Instagram</a>
        </div>
      </div>
    </section>
  </body>
</html>
